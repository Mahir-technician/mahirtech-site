# Nginx vhost for mahirtech.cloud (Next.js behind localhost:3000)
# Usage:
#   sudo cp deploy/nginx/mahirtech.cloud.conf /etc/nginx/sites-available/mahirtech.cloud
#   sudo ln -sf /etc/nginx/sites-available/mahirtech.cloud /etc/nginx/sites-enabled/mahirtech.cloud
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
  listen 80;
  listen [::]:80;
  server_name mahirtech.cloud www.mahirtech.cloud;

  # Temporary ACME challenge support before/while SSL is provisioned
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name mahirtech.cloud www.mahirtech.cloud;

  # Update these paths if certbot stores certs elsewhere
  ssl_certificate /etc/letsencrypt/live/mahirtech.cloud/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mahirtech.cloud/privkey.pem;

  # Basic TLS hardening
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  # Helps verify the correct server block is answering
  add_header X-Debug-Server "mahirtech-nextjs" always;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 60s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
  }
}